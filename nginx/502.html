<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фестиваль школьного спорта — Обновление</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #e5e7eb;
    border-top-color: #10b981;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
  p { font-size: 15px; color: #6b7280; line-height: 1.6; }
  .retry { margin-top: 28px; }
  .retry a {
    display: inline-block;
    padding: 10px 24px;
    background: #10b981;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
  }
  .retry a:hover { background: #059669; }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Сайт обновляется</h1>
    <p>Фестиваль школьного спорта скоро вернётся. Обычно это занимает пару минут.</p>
    <div class="retry">
      <a href="javascript:location.reload()">Обновить страницу</a>
    </div>
  </div>
  <script>setTimeout(()=>location.reload(), 15000)</script>
</body>
</html>
