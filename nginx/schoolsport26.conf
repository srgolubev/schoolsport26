# Nginx конфиг для schoolsport26
# Скопировать на сервер: cp nginx/schoolsport26.conf /etc/nginx/sites-available/schoolsport26
# Активировать: ln -sf /etc/nginx/sites-available/schoolsport26 /etc/nginx/sites-enabled/
# Применить: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name festival.schoolsportmos.ru 95.163.234.54;

    # Кастомная страница при 502 (сайт обновляется)
    error_page 502 /502.html;
    location = /502.html {
        root /var/www;
        internal;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
